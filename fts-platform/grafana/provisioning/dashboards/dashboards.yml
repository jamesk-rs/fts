apiVersion: 1

providers:
  - name: 'FTS Dashboards'
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /etc/grafana/provisioning/dashboards
  - name: 'Old Dashboards'
    orgId: 1
    folder: 'Old'
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /etc/grafana/provisioning/dashboards/old
