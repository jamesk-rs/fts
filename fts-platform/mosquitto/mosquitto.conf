# Mosquitto MQTT Broker Configuration for FTS Platform

# Network listeners
listener 1883
protocol mqtt

# WebSocket support (for web dashboards)
listener 9001
protocol websockets

# Authentication (anonymous for development, add auth for production)
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# Connection settings
max_keepalive 120
