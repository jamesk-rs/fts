# Mosquitto Configuration - Split Cloud Profile
# Authenticated access only - receives bridged messages from lab

listener 1883
protocol mqtt

listener 9001
protocol websockets

# Authentication required
allow_anonymous false
password_file /mosquitto/config/passwd

persistence true
persistence_location /mosquitto/data/
autosave_interval 60

# Queue settings (0 = unlimited, bounded by disk/memory)
max_queued_messages 0
max_queued_bytes 0

log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

max_keepalive 120
