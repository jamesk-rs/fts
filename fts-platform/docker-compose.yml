services:
  mosquitto:
    profiles: ["local", "split-local", "split-cloud"]
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 1883"]
      interval: 30s
      timeout: 10s
      retries: 3

  influxdb:
    profiles: ["local", "split-cloud"]
    image: influxdb:2
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUX_ADMIN_USERNAME:-admin}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUX_ADMIN_PASSWORD:-changeme}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUX_ORG:-fts}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUX_BUCKET:-fts}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUX_ADMIN_TOKEN:-changeme}
      #- INFLUXD_QUERY_CONCURRENCY=0
      #- INFLUXD_QUERY_QUEUE_SIZE=0
      #- INFLUXD_STORAGE_CACHE_MAX_MEMORY_SIZE=4294967296
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - ./influxdb/init-buckets.sh:/docker-entrypoint-initdb.d/init-buckets.sh:ro
    restart: unless-stopped
    #deploy:
    #  resources:
    #    limits:
    #      cpus: '4'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  telegraf:
    profiles: ["local", "split-cloud"]
    image: telegraf:1.29
    volumes:
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    environment:
      - HOST_PROC=/host/proc
      - HOST_SYS=/host/sys
      - INFLUX_TOKEN=${INFLUX_ADMIN_TOKEN:-changeme}
      - INFLUX_ORG=${INFLUX_ORG:-fts}
      - INFLUX_BUCKET=${INFLUX_BUCKET:-fts}
      - INFLUX_BUCKET_HEALTH=health
      - MQTT_USERNAME=${MQTT_USERNAME:-fts}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-changeme}
    group_add:
      - "${DOCKER_GID}"
    depends_on:
      mosquitto:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    profiles: ["local", "split-cloud"]
    image: grafana/grafana:11.5.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=grafana-clock-panel
      - GF_FEATURE_TOGGLES_ENABLE=publicDashboards
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana-init:
    profiles: ["local", "split-cloud"]
    image: curlimages/curl:latest
    volumes:
      - ./grafana/init-public-dashboards.sh:/init-public-dashboards.sh:ro
    environment:
      - GRAFANA_URL=http://grafana:3000
      - GRAFANA_USER=admin
      - GRAFANA_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    entrypoint: ["/bin/sh", "/init-public-dashboards.sh"]
    depends_on:
      grafana:
        condition: service_healthy
    restart: "no"

  telegraf-lab:
    profiles: ["local", "split-local"]
    image: telegraf:1.29
    volumes:
      - ./telegraf/telegraf-lab.conf:/etc/telegraf/telegraf.conf:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    environment:
      - HOST_PROC=/host/proc
      - HOST_SYS=/host/sys
    group_add:
      - "${DOCKER_GID}"
    depends_on:
      mosquitto:
        condition: service_healthy
    restart: unless-stopped

  stream-mqtt:
    profiles: ["local", "split-local"]
    build: ./qa
    depends_on:
      mosquitto:
        condition: service_healthy
    environment:
      - USRP_RX_ADDR=192.168.10.2
      - MQTT_HOST=mosquitto
    command: ["stream-mqtt", "--mqtt-host", "mosquitto"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G

volumes:
  mosquitto_data:
  mosquitto_log:
  influxdb_data:
  grafana_data:
