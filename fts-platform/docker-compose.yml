services:
  mosquitto:
    profiles: ["local", "split-local", "split-cloud"]
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 1883"]
      interval: 30s
      timeout: 10s
      retries: 3

  influxdb:
    profiles: ["local", "split-cloud"]
    image: influxdb:2.7
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUX_ADMIN_USERNAME:-admin}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUX_ADMIN_PASSWORD:?Create .env from .env.example}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUX_ORG:-fts}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUX_BUCKET:-fts}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUX_ADMIN_TOKEN:?Create .env from .env.example}
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - ./influxdb/init-buckets.sh:/docker-entrypoint-initdb.d/init-buckets.sh:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '4'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  telegraf:
    profiles: ["local", "split-cloud"]
    image: telegraf:1.29
    volumes:
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    environment:
      - HOST_PROC=/host/proc
      - HOST_SYS=/host/sys
      - INFLUX_TOKEN=${INFLUX_ADMIN_TOKEN:?Create .env from .env.example}
    group_add:
      - "${DOCKER_GID:-124}"  # GID of docker group on host (run: stat -c '%g' /var/run/docker.sock)
    depends_on:
      mosquitto:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    profiles: ["rl"]  # Only needed for RL engine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    profiles: ["local", "split-cloud"]
    image: grafana/grafana:10.4.3
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?Create .env from .env.example}
      - GF_INSTALL_PLUGINS=grafana-clock-panel
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  rl_engine:
    build: ./rl_engine
    profiles: ["rl"]  # Disabled by default, use: docker compose --profile rl up
    depends_on:
      mosquitto:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=${INFLUX_ADMIN_TOKEN:?Create .env from .env.example}
      - INFLUX_ORG=${INFLUX_ORG:-fts}
      - INFLUX_BUCKET=${INFLUX_BUCKET:-fts}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOG_LEVEL=INFO
    restart: unless-stopped

  stream-mqtt:
    profiles: ["local", "split-local"]
    build: ./qa
    depends_on:
      mosquitto:
        condition: service_healthy
    environment:
      - USRP_RX_ADDR=192.168.10.2
      - MQTT_HOST=mosquitto
    command: ["stream-mqtt", "--mqtt-host", "mosquitto"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G

volumes:
  mosquitto_data:
  mosquitto_log:
  influxdb_data:
  redis_data:
  grafana_data:
