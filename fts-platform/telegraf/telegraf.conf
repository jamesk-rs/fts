# Telegraf Configuration for FTS
# MQTT → InfluxDB bridge

[agent]
  interval = "1s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "1s"
  flush_jitter = "0s"
  precision = "1ns"
  omit_hostname = true

# InfluxDB v2 Output
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "fts-token-change-me"
  organization = "fts"
  bucket = "fts"

# MQTT Consumer - FTM reports
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["fts/+/ftm"]
  qos = 1
  data_format = "json_v2"
  topic_tag = ""

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "fts/+/ftm"
    tags = "_/device/_"

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "ftm"
    # Note: Device "ts" is uptime, not Unix timestamp. Use arrival time instead.

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "session_id"
      type = "uint"

    # RTT is sent as int32 number (clamped from int64)
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "rtt_ps"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "rssi"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "t1"
      type = "string"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "t2"
      type = "string"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "t3"
      type = "string"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "t4"
      type = "string"

# Convert string fields to integers for FTM (t1-t4 are 64-bit, sent as strings)
[[processors.converter]]
  namepass = ["ftm"]
  [processors.converter.fields]
    integer = ["t1", "t2", "t3", "t4"]

# MQTT Consumer - Metrics
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["fts/+/metrics"]
  qos = 0
  data_format = "json_v2"
  topic_tag = ""

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "fts/+/metrics"
    tags = "_/device/_"

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "metrics"
    # Note: Device "ts" is uptime, not Unix timestamp. Use arrival time instead.

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "cycle_counter"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "period_ticks"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "period_delta"
      type = "int"

# MQTT Consumer - SDR Edges
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["fts/sdr/edges"]
  qos = 0
  data_format = "json_v2"
  topic_tag = ""

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "edges"
    timestamp_path = "ts"
    timestamp_format = "unix"
    timestamp_timezone = "UTC"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "channel_a_edge_ns"
      rename = "channel_a_ns"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "channel_b_edge_ns"
      rename = "channel_b_ns"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "delay_ns"
      type = "int"

# MQTT Consumer - FTM Stats (session statistics)
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["fts/+/ftm_stats"]
  qos = 1
  data_format = "json_v2"
  topic_tag = ""

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "fts/+/ftm_stats"
    tags = "_/device/_"

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "ftm_stats"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "session_id"
      type = "uint"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "status"
      type = "uint"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "count"
      type = "uint"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "rtt_avg_ps"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "rtt_min_ps"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "rtt_max_ps"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "rssi_avg"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "rssi_min"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "rssi_max"
      type = "int"
