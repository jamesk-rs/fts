# MQTT Consumer - SDR Phase Noise (FFT-based phase noise from stream-mqtt)
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  username = "${MQTT_USERNAME}"
  password = "${MQTT_PASSWORD}"
  client_id = "telegraf-phase-noise"
  persistent_session = true
  topics = ["sdr/phase_noise"]
  qos = 1
  data_format = "json_v2"
  topic_tag = ""

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "phase_noise"
    timestamp_path = "ts"
    timestamp_format = "unix"
    timestamp_timezone = "UTC"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "sample_count"
      type = "uint"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "duration_seconds"
      type = "float"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "pulse_freq"
      type = "float"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "rms_rad"
      type = "float"
      optional = true

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "rms_jitter_ns"
      type = "float"
      optional = true

    # L(f) at logarithmic frequency bins (dBc/Hz)
