# =============================================================================
# System Performance Metrics
# =============================================================================

# Telegraf internal metrics (buffer usage, throughput, errors)
[[inputs.internal]]
  collect_memstats = true

# CPU usage - per core and total
[[inputs.cpu]]
  percpu = true
  totalcpu = true
  collect_cpu_time = false
  report_active = false

# System memory usage
[[inputs.mem]]

# Swap memory usage
[[inputs.swap]]

# Disk I/O statistics
[[inputs.diskio]]

# Disk space usage
[[inputs.disk]]
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "iso9660", "overlay", "aufs", "squashfs"]

# System load averages
[[inputs.system]]

# Network interface statistics
[[inputs.net]]

# Docker container statistics (requires docker socket mount)
[[inputs.docker]]
  endpoint = "unix:///var/run/docker.sock"
  gather_services = false
  container_names = []
  container_name_include = []
  container_name_exclude = []
  timeout = "5s"
  perdevice = true
  total = true
  interval = "10s"

# Tag cloud health metrics with site=cloud
[[processors.override]]
  namepass = ["cpu", "mem", "swap", "disk", "diskio", "system", "net", "docker*", "internal*"]
  [processors.override.tags]
    site = "cloud"

# =============================================================================
# Lab Health Metrics (from MQTT bridge)
# =============================================================================

# MQTT Consumer - Lab health metrics (CPU, memory, disk, Docker from lab)
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  username = "${MQTT_USERNAME}"
  password = "${MQTT_PASSWORD}"
  client_id = "telegraf-lab-health"
  persistent_session = true
  topics = ["health/lab/#"]
  qos = 1
  data_format = "json"
  json_time_key = "timestamp"
  json_time_format = "unix_ns"
  tag_keys = ["host", "site", "cpu", "device", "fstype", "mode", "path", "interface",
              "container_name", "container_image", "container_version", "engine_host"]
