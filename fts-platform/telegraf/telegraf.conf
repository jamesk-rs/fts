# Telegraf Configuration for FTS
# MQTT → InfluxDB bridge

[agent]
  hostname = "fts-platform"
  interval = "1s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "1s"
  flush_jitter = "0s"
  precision = "1ns"
  omit_hostname = true

# InfluxDB v2 Output - FTS data only
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "${INFLUX_TOKEN}"
  organization = "${INFLUX_ORG}"
  bucket = "${INFLUX_BUCKET}"
  namedrop = ["cpu", "mem", "disk", "diskio", "system", "net", "docker*", "internal*"]

# InfluxDB v2 Output - System health metrics
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "${INFLUX_TOKEN}"
  organization = "${INFLUX_ORG}"
  bucket = "${INFLUX_BUCKET_HEALTH}"
  namepass = ["cpu", "mem", "swap", "disk", "diskio", "system", "net", "docker*", "internal*"]

# MQTT Consumer - FTM reports (from timestamped topic)
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  username = "${MQTT_USERNAME}"
  password = "${MQTT_PASSWORD}"
  client_id = "telegraf-ftm"
  persistent_session = true
  topics = ["fts_ts/+/ftm"]
  qos = 1
  data_format = "json_v2"
  topic_tag = ""

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "fts_ts/+/ftm"
    tags = "_/device/_"

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "ftm"
    timestamp_path = "timestamp"
    timestamp_format = "unix_ns"
    timestamp_timezone = "UTC"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "session_id"
      type = "uint"

    # RTT is sent as int32 number (clamped from int64)
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "rtt_ps"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "rssi"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "t1"
      type = "string"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "t2"
      type = "string"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "t3"
      type = "string"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "t4"
      type = "string"

# Convert string fields to integers for FTM (t1-t4 are 64-bit, sent as strings)
[[processors.converter]]
  namepass = ["ftm"]
  [processors.converter.fields]
    integer = ["t1", "t2", "t3", "t4"]

