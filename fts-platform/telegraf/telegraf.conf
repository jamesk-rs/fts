      type = "float"
      optional = true

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "f_2"
      type = "float"
      optional = true

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "f_5"
      type = "float"
      optional = true

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "f_10"
      type = "float"
      optional = true

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "f_20"
      type = "float"
      optional = true

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "f_50"
      type = "float"
      optional = true

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "f_100"
      type = "float"
      optional = true

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "f_200"
      type = "float"
      optional = true

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "f_500"
      type = "float"
      optional = true
    # Note: f_1000 removed (exactly at Nyquist for 2kHz, edge case)

