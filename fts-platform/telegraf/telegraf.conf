# Telegraf Configuration for FTS
# MQTT → InfluxDB bridge

[agent]
  hostname = "fts-platform"
  interval = "1s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "1s"
  flush_jitter = "0s"
  precision = "1ns"
  omit_hostname = true

# InfluxDB v2 Output
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "fts-token-change-me"
  organization = "fts"
  bucket = "fts"

# MQTT Consumer - FTM reports
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["fts/+/ftm"]
  qos = 1
  data_format = "json_v2"
  topic_tag = ""

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "fts/+/ftm"
    tags = "_/device/_"

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "ftm"
    # Note: Device "ts" is uptime, not Unix timestamp. Use arrival time instead.

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "session_id"
      type = "uint"

    # RTT is sent as int32 number (clamped from int64)
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "rtt_ps"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "rssi"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "t1"
      type = "string"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "t2"
      type = "string"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "t3"
      type = "string"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "t4"
      type = "string"

# Convert string fields to integers for FTM (t1-t4 are 64-bit, sent as strings)
[[processors.converter]]
  namepass = ["ftm"]
  [processors.converter.fields]
    integer = ["t1", "t2", "t3", "t4"]

# MQTT Consumer - Metrics
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["fts/+/metrics"]
  qos = 0
  data_format = "json_v2"
  topic_tag = ""

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "fts/+/metrics"
    tags = "_/device/_"

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "metrics"
    # Note: Device "ts" is uptime, not Unix timestamp. Use arrival time instead.

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "cycle_counter"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "period_ticks"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "period_delta"
      type = "int"

# MQTT Consumer - SDR Edges
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["fts/sdr/edges"]
  qos = 0
  data_format = "json_v2"
  topic_tag = ""

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "edges"
    timestamp_path = "ts"
    timestamp_format = "unix"
    timestamp_timezone = "UTC"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "channel_a_edge_ns"
      rename = "channel_a_ns"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "channel_b_edge_ns"
      rename = "channel_b_ns"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "delay_ns"
      type = "int"

# MQTT Consumer - FTM Stats (session statistics)
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["fts/+/ftm_stats"]
  qos = 1
  data_format = "json_v2"
  topic_tag = ""

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "fts/+/ftm_stats"
    tags = "_/device/_"

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "ftm_stats"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "session_id"
      type = "uint"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "status"
      type = "uint"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "count"
      type = "uint"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "rtt_avg_ps"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "rtt_min_ps"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "rtt_max_ps"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "rssi_avg"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "rssi_min"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "rssi_max"
      type = "int"

# MQTT Consumer - SDR Stats (rolling window statistics from stream-mqtt)
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["fts/sdr/stats"]
  qos = 1
  data_format = "json_v2"
  topic_tag = ""

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "sdr_stats"
    timestamp_path = "ts"
    timestamp_format = "unix"
    timestamp_timezone = "UTC"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "count"
      type = "uint"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "mean_ns"
      type = "float"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "std_ns"
      type = "float"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "min_ns"
      type = "float"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "max_ns"
      type = "float"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "p50_ns"
      type = "float"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "p95_ns"
      type = "float"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "p99_ns"
      type = "float"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "p999_ns"
      type = "float"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "overflow_count"
      type = "uint"

# =============================================================================
# System Performance Metrics
# =============================================================================

# Telegraf internal metrics (buffer usage, throughput, errors)
[[inputs.internal]]
  collect_memstats = true

# CPU usage - per core and total
[[inputs.cpu]]
  percpu = true
  totalcpu = true
  collect_cpu_time = false
  report_active = false

# System memory usage
[[inputs.mem]]

# Disk I/O statistics
[[inputs.diskio]]

# Disk space usage
[[inputs.disk]]
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "iso9660", "overlay", "aufs", "squashfs"]

# System load averages
[[inputs.system]]

# Network interface statistics
[[inputs.net]]

# Docker container statistics (requires docker socket mount)
[[inputs.docker]]
  endpoint = "unix:///var/run/docker.sock"
  gather_services = false
  container_names = []
  container_name_include = []
  container_name_exclude = []
  timeout = "5s"
  perdevice = true
  total = true
