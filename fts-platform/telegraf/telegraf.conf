# MQTT Consumer - SDR Edges
# Supports matched edges (both channels) and unmatched edges (single channel)
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  username = "${MQTT_USERNAME}"
  password = "${MQTT_PASSWORD}"
  client_id = "telegraf-edges"
  persistent_session = true
  topics = ["sdr/edges"]
  qos = 1
  data_format = "json_v2"
  topic_tag = ""

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "edges"
    timestamp_path = "ts"
    timestamp_format = "unix"
    timestamp_timezone = "UTC"

    # Optional: present for matched edges and unmatched A edges
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "channel_a_edge_ns"
      rename = "channel_a_ns"
      type = "int"
      optional = true

    # Optional: present for matched edges and unmatched B edges
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "channel_b_edge_ns"
      rename = "channel_b_ns"
      type = "int"
      optional = true

# Compute delay_ns for matched edges (where both channels present)
[[processors.starlark]]
  namepass = ["edges"]
  source = '''
def apply(metric):
    a = metric.fields.get("channel_a_ns")
    b = metric.fields.get("channel_b_ns")
    if a != None and b != None:
        metric.fields["delay_ns"] = b - a
    return metric
'''

