# Telegraf Configuration for FTS Lab
# Collects FTS data with timestamp injection + local health metrics
# Publishes to MQTT for bridging to cloud

[agent]
  hostname = "fts-lab"
  interval = "1s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "1s"
  flush_jitter = "0s"
  precision = "1ns"
  omit_hostname = false

# =============================================================================
# FTS Data - Subscribe to raw topics, republish with timestamp
# =============================================================================

# MQTT Consumer - FTM reports
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  client_id = "telegraf-lab-ftm"
  persistent_session = true
  topics = ["fts/+/ftm"]
  qos = 1
  data_format = "json_v2"
  topic_tag = ""

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "fts/+/ftm"
    tags = "_/device/_"

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "ftm"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "session_id"
      type = "uint"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "rtt_ps"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "rssi"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "t1"
      type = "string"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "t2"
      type = "string"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "t3"
      type = "string"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "t4"
      type = "string"

# Convert string fields to integers for FTM (t1-t4 are 64-bit, sent as strings)
[[processors.converter]]
  namepass = ["ftm"]
  [processors.converter.fields]
    integer = ["t1", "t2", "t3", "t4"]

# MQTT Consumer - FTM Stats (session statistics)
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  client_id = "telegraf-lab-ftm-stats"
  persistent_session = true
  topics = ["fts/+/ftm_stats"]
  qos = 1
  data_format = "json_v2"
  topic_tag = ""

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "fts/+/ftm_stats"
    tags = "_/device/_"

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "ftm_stats"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "session_id"
      type = "uint"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "status"
      type = "uint"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "count"
      type = "uint"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "rtt_avg_ps"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "rtt_min_ps"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "rtt_max_ps"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "rssi_avg"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "rssi_min"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "rssi_max"
      type = "int"

# MQTT Consumer - DTC Request (alignment request from DTC)
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  client_id = "telegraf-lab-dtc"
  persistent_session = true
  topics = ["fts/+/dtc_request"]
  qos = 1
  data_format = "json_v2"
  topic_tag = ""

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "fts/+/dtc_request"
    tags = "_/device/_"

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "dtc_request"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "cycle_counter"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "local_ticks"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "base_period"
      type = "uint"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "base_period_frac"
      type = "uint"

# MQTT Consumer - CRM Stats (clock relationship model statistics)
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  client_id = "telegraf-lab-crm"
  persistent_session = true
  topics = ["fts/+/crm_stats"]
  qos = 1
  data_format = "json_v2"
  topic_tag = ""

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "fts/+/crm_stats"
    tags = "_/device/_"

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "crm_stats"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "samples"
      type = "uint"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "new_samples"
      type = "uint"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "r_squared"
      type = "float"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "std_ns"
      type = "float"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "ppm_lr"
      type = "float"

# MQTT Consumer - DTR Feedback (alignment feedback from DTR)
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  client_id = "telegraf-lab-dtr"
  persistent_session = true
  topics = ["fts/+/dtr_feedback"]
  qos = 1
  data_format = "json_v2"
  topic_tag = ""

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "fts/+/dtr_feedback"
    tags = "_/device/_"

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "dtr_feedback"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "period_ticks"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "period_ticks_delta"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "cycle_delta"
      type = "int"

# =============================================================================
# Add measurement name as tag for MQTT topic routing
# =============================================================================

[[processors.starlark]]
  namepass = ["ftm", "ftm_stats", "dtc_request", "crm_stats", "dtr_feedback"]
  source = '''
def apply(metric):
    metric.tags["_measurement"] = metric.name
    return metric
'''

# =============================================================================
# MQTT Output - Republish FTS data with timestamps to fts_ts/ namespace
# =============================================================================

[[outputs.mqtt]]
  servers = ["tcp://mosquitto:1883"]
  data_format = "json"
  json_timestamp_units = "1ns"
  # Route by measurement and device tag
  # Topic pattern: fts_ts/{device}/{measurement}
  topic = 'fts_ts/{{ .Tag "device" }}/{{ .Tag "_measurement" }}'
  namepass = ["ftm", "ftm_stats", "dtc_request", "crm_stats", "dtr_feedback"]

# =============================================================================
# System Health Metrics
# =============================================================================

# CPU usage - per core and total
[[inputs.cpu]]
  percpu = true
  totalcpu = true
  collect_cpu_time = false
  report_active = false

# System memory usage
[[inputs.mem]]

# Swap memory usage
[[inputs.swap]]

# Disk I/O statistics
[[inputs.diskio]]

# Disk space usage
[[inputs.disk]]
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "iso9660", "overlay", "aufs", "squashfs"]

# System load averages
[[inputs.system]]

# Network interface statistics
[[inputs.net]]

# Docker container statistics (requires docker socket mount)
[[inputs.docker]]
  endpoint = "unix:///var/run/docker.sock"
  gather_services = false
  container_names = []
  container_name_include = []
  container_name_exclude = []
  timeout = "5s"
  perdevice = true
  total = true
  interval = "10s"

# Tag all health metrics with site=lab and add measurement name for topic routing
[[processors.override]]
  namepass = ["cpu", "mem", "swap", "disk", "diskio", "system", "net", "docker*", "internal*"]
  [processors.override.tags]
    site = "lab"

[[processors.starlark]]
  namepass = ["cpu", "mem", "swap", "disk", "diskio", "system", "net", "docker*", "internal*"]
  source = '''
def apply(metric):
    metric.tags["_measurement"] = metric.name
    return metric
'''

# =============================================================================
# MQTT Output - Health metrics to health/lab/ namespace
# =============================================================================

[[outputs.mqtt]]
  servers = ["tcp://mosquitto:1883"]
  data_format = "json"
  json_timestamp_units = "1ns"
  topic = 'health/lab/{{ .Tag "_measurement" }}'
  namepass = ["cpu", "mem", "swap", "disk", "diskio", "system", "net", "docker*", "internal*"]
