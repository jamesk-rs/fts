# Split-local profile: Mosquitto with bridge to cloud + stream-mqtt
# Usage: docker compose -f docker-compose.split-local.yml up -d

services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 1883"]
      interval: 30s
      timeout: 10s
      retries: 3

  stream-mqtt:
    build: ./qa
    depends_on:
      mosquitto:
        condition: service_healthy
    environment:
      - USRP_RX_ADDR=192.168.10.2
      - MQTT_HOST=mosquitto
    command: ["stream-mqtt", "--mqtt-host", "mosquitto"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G

volumes:
  mosquitto_data:
  mosquitto_log:
