# Telegraf Configuration for FTS Cloud Deployment
# Uses environment variables for credentials

[agent]
  hostname = "fts-platform"
  interval = "1s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "1s"
  flush_jitter = "0s"
  precision = "1ns"
  omit_hostname = true

# InfluxDB v2 Output - FTS data only
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "${INFLUX_TOKEN}"
  organization = "fts"
  bucket = "fts"
  namedrop = ["cpu", "mem", "disk", "diskio", "system", "net", "docker*", "internal*"]

# InfluxDB v2 Output - System health metrics
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "${INFLUX_TOKEN}"
  organization = "fts"
  bucket = "health"
  namepass = ["cpu", "mem", "disk", "diskio", "system", "net", "docker*", "internal*"]

# MQTT Consumer - FTM reports
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["fts/+/ftm"]
  qos = 1
  data_format = "json_v2"
  topic_tag = ""

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "fts/+/ftm"
    tags = "_/device/_"

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "ftm"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "session_id"
      type = "uint"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "rtt_ps"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "rssi"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "t1"
      type = "string"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "t2"
      type = "string"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "t3"
      type = "string"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "t4"
      type = "string"

# Convert string fields to integers for FTM (t1-t4 are 64-bit, sent as strings)
[[processors.converter]]
  namepass = ["ftm"]
  [processors.converter.fields]
    integer = ["t1", "t2", "t3", "t4"]

# MQTT Consumer - DTC Request
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["fts/+/dtc_request"]
  qos = 1
  data_format = "json_v2"
  topic_tag = ""

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "fts/+/dtc_request"
    tags = "_/device/_"

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "dtc_request"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "cycle_counter"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "local_ticks"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "base_period"
      type = "uint"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "base_period_frac"
      type = "uint"

# MQTT Consumer - CRM Stats
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["fts/+/crm_stats"]
  qos = 1
  data_format = "json_v2"
  topic_tag = ""

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "fts/+/crm_stats"
    tags = "_/device/_"

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "crm_stats"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "samples"
      type = "uint"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "new_samples"
      type = "uint"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "r_squared"
      type = "float"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "std_ns"
      type = "float"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "ppm_lr"
      type = "float"

# MQTT Consumer - SDR Edges
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["fts/sdr/edges"]
  qos = 0
  data_format = "json_v2"
  topic_tag = ""

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "edges"
    timestamp_path = "ts"
    timestamp_format = "unix"
    timestamp_timezone = "UTC"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "channel_a_edge_ns"
      rename = "channel_a_ns"
      type = "int"
      optional = true

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "channel_b_edge_ns"
      rename = "channel_b_ns"
      type = "int"
      optional = true

# Compute delay_ns for matched edges
[[processors.starlark]]
  namepass = ["edges"]
  source = '''
def apply(metric):
    a = metric.fields.get("channel_a_ns")
    b = metric.fields.get("channel_b_ns")
    if a != None and b != None:
        metric.fields["delay_ns"] = b - a
    return metric
'''

